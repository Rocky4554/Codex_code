# ── Production Profile ────────────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=prod in docker-compose.prod.yml
# All secrets come from environment variables — nothing hardcoded.

# ── Application ──────────────────────────────────────────────────
spring.application.name=codex-platform
server.port=${PORT:8080}

# ── Server (512MB RAM cap on Northflank free tier) ───────────────
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=4

# ── PostgreSQL (Supabase cloud) ──────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:aws-1-ap-south-1.pooler.supabase.com}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USERNAME:postgres.adbsepltuglmuxqcrjkw}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — use update for now (switch to validate + Flyway later)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hikari — tuned for Neon free tier (max 20 connections via pooler)
# Neon suspends compute after 5 min idle; connections die silently.
# Short max-lifetime ensures we recycle before Neon kills them.
spring.datasource.hikari.pool-name=HikariCodexPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true

# ── Redisson ─────────────────────────────────────────────────────
redisson.single-server-config.address=${REDIS_URL:redis://redis-14421.crce263.ap-south-1-1.ec2.cloud.redislabs.com:14421}
redisson.single-server-config.username=default
redisson.single-server-config.password=${REDIS_PASSWORD:xnTKXnLhaMfZP2gPmbDbLAsi5UTdqfS7}
redisson.single-server-config.connection-pool-size=10
redisson.single-server-config.connection-minimum-idle-size=2

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Docker Execution ─────────────────────────────────────────────
execution.docker.host=${EXECUTION_DOCKER_HOST:unix:///var/run/docker.sock}
execution.temp-dir=${EXECUTION_TEMP_DIR:/tmp/codex/submissions}
execution.default-time-limit-ms=5000
execution.default-memory-limit-mb=256
execution.cleanup-enabled=true
execution.worker-count=${EXECUTION_WORKER_COUNT:1}

# ── Execution Mode ───────────────────────────────────────────────
# "local"  → drive Docker on the same machine (legacy path).
# "remote" → POST submissions to the executor agent on EC2.
# Set to "remote" on Render-hosted backends; leave "local" on EC2.
execution.mode=${EXECUTION_MODE:remote}

# ── Executor Agent (only used when execution.mode=remote) ───────
executor.agent.base-url=${EXECUTOR_AGENT_BASE_URL:}
executor.agent.token=${EXECUTOR_AGENT_TOKEN:}
executor.agent.timeout-ms=${EXECUTOR_AGENT_TIMEOUT_MS:90000}

# ── CORS ─────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ── Submission Cache & Persist ───────────────────────────────────
submission.cache.result-ttl-seconds=3600
submission.persist.executor.core-size=2
submission.persist.executor.max-size=4
submission.persist.executor.queue-capacity=100

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.codex.platform=${LOG_LEVEL:INFO}
logging.level.com.codex.platform.queue.service.QueueService=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Actuator & Micrometer ────────────────────────────────────────
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.export.prometheus.enabled=true
