# Spring Application
spring.application.name=codex-platform

# Server Configuration
server.port=${PORT:8080}

# PostgreSQL Configuration (Supabase Cloud)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.adbsepltuglmuxqcrjkw}
spring.datasource.password=${DB_PASSWORD:aiQcRkmdP2uJ9mVT}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# HIKARI CONNECTION POOL
spring.datasource.hikari.pool-name=HikariCodexPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=20000

# Redis Configuration (Basic Spring Redis handles)
spring.redis.host=${REDIS_HOST:xeric-macrofresh-opalescent-15253.db.redis.io}
spring.redis.port=${REDIS_PORT:17861}
spring.redis.password=${REDIS_PASSWORD:sa0YYDvgCfINL9eUoO81hZMoYFlEHCRS}

# Redisson Configuration
redisson.single-server-config.address=${REDIS_URL:redis://xeric-macrofresh-opalescent-15253.db.redis.io:17861}
redisson.single-server-config.username=default
redisson.single-server-config.password=${REDIS_PASSWORD:sa0YYDvgCfINL9eUoO81hZMoYFlEHCRS}
redisson.single-server-config.connection-pool-size=64
redisson.single-server-config.connection-minimum-idle-size=10


# JWT Configuration
jwt.secret=${JWT_SECRET:this-default-secret-is-for-local-dev-only-change-me-1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Docker Execution Configuration
execution.docker.host=${EXECUTION_DOCKER_HOST:npipe:////./pipe/docker_engine}
execution.temp-dir=${EXECUTION_TEMP_DIR:C:/temp/codex/submissions}
execution.default-time-limit-ms=5000
execution.default-memory-limit-mb=256
execution.cleanup-enabled=true
execution.worker-count=1

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.com.codex.platform=${LOG_LEVEL:DEBUG}
logging.level.com.codex.platform.queue.service.QueueService=INFO
logging.level.org.springframework.security=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=WARN

# Submission Result Cache (Redis-first delivery)
# How long to keep results in Redis after execution (users see results instantly,
# DB write happens async; entry is evicted once DB write succeeds)
submission.cache.result-ttl-seconds=3600

# Async DB persist thread pool (used by AsyncResultPersister)
submission.persist.executor.core-size=2
submission.persist.executor.max-size=4
submission.persist.executor.queue-capacity=100

# Gemini (AI problem authoring) Configuration
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.timeout-ms=${GEMINI_TIMEOUT_MS:120000}
# CodeBot per-user daily request limit
assistant.daily-limit=${ASSISTANT_DAILY_LIMIT:50}

# Executor Agent Configuration (for connecting to EC2 executor)
execution.mode=${EXECUTION_MODE:remote}
executor.agent.base-url=${EXECUTOR_AGENT_BASE_URL:http://3.110.161.110:8081}
executor.agent.token=${EXECUTOR_AGENT_TOKEN:0e57712cd57a8f690b43ebbec3ef5f5fba07fc5c9ddd927afde85d01a17f5699}
executor.agent.timeout-ms=${EXECUTOR_AGENT_TIMEOUT_MS:90000}

# Actuator & Micrometer
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.export.prometheus.enabled=true
